<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Балансы">
  <title>Балансы</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      font-size: 18px;
      display: flex;
      flex-direction: column;
      padding: max(env(safe-area-inset-top), 1rem) 1rem max(env(safe-area-inset-bottom), 1rem);
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      padding-top: 2.5rem;
    }
    h1 { font-size: 1rem; font-weight: 500; opacity: 0.5; text-align: center; letter-spacing: 0.04em; text-transform: uppercase; }
    .topnav {
      position: fixed; top: max(env(safe-area-inset-top), 0.5rem); left: 0.5rem;
      display: flex; gap: 0; z-index: 10;
    }
    .topbtn, #gear {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; color: #f0f0f0; opacity: 0.4;
      padding: 0; border: 0; border-radius: 50%;
      text-decoration: none; cursor: pointer;
    }
    .topbtn.active { color: #0abab5; opacity: 1; }
    .topbtn:active, #gear:active { transform: scale(0.92); }
    .topbtn svg, #gear svg { width: 22px; height: 22px; }
    #gear { position: fixed; top: max(env(safe-area-inset-top), 0.5rem); right: 0.5rem; z-index: 10; }
    #accounts { display: flex; flex-direction: column; gap: 0.6rem; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1rem 1.1rem;
      background: #141414;
      border: 1px solid #1f1f1f;
      border-radius: 14px;
    }
    /* Everyday (primary) account — first in the list, accented with the Tiffany
       teal so it clearly reads as the main one. */
    .row.primary {
      border: 1.5px solid #0abab5;
      background: linear-gradient(180deg, #0f1f1e 0%, #0c1716 100%);
      box-shadow: 0 0 0 1px #0abab5, 0 0 18px -4px rgba(10,186,181,0.55);
      padding: 1.15rem 1.1rem;
    }
    .row.primary .name { opacity: 1; font-weight: 700; color: #0abab5; }
    .row.primary .amount { font-size: 1.45rem; }
    .row.primary .currency { opacity: 0.7; }
    .row .name { font-size: 1rem; opacity: 0.8; }
    .row .amount { font-size: 1.25rem; font-weight: 600; font-variant-numeric: tabular-nums; display: inline-flex; align-items: baseline; }
    .row .amount .num { text-align: right; }
    /* Fixed-width currency box keeps the number's right edge constant across rows,
       so every amount lines up in one vertical column regardless of currency width. */
    .row .currency { font-size: 0.85rem; opacity: 0.5; margin-left: 0.4rem; font-weight: 400; display: inline-block; width: 2.6rem; text-align: left; }
    #status { min-height: 1.5rem; text-align: center; font-size: 0.9rem; opacity: 0.85; line-height: 1.4; }
    #status.err { color: #e87171; }
    #updated { font-size: 0.78rem; opacity: 0.4; text-align: center; }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 20;
    }
    #overlay.open { display: flex; }
    #panel {
      width: 100%;
      max-width: 420px;
      background: #141414;
      border-radius: 16px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    #panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; }
    #panel-head h2 { font-size: 0.9rem; font-weight: 500; opacity: 0.7; letter-spacing: 0.04em; text-transform: uppercase; }
    #close { width: 32px; height: 32px; padding: 0; background: transparent; color: #f0f0f0; opacity: 0.5; font-size: 1.4rem; border: 0; border-radius: 50%; cursor: pointer; }
    #panel input, #panel button.action {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
      border-radius: 10px;
      font-family: inherit;
    }
    #panel input {
      border: 1px solid #2a2a2a;
      background: #0a0a0a;
      color: #f0f0f0;
      outline: none;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.85rem;
    }
    #panel input:focus { border-color: #0abab5; }
    #panel button.action { background: #0abab5; color: #0a0a0a; font-weight: 600; margin-top: 0.25rem; border: 0; cursor: pointer; }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="./" class="topbtn" aria-label="Запись">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </a>
    <a href="events.html" class="topbtn" aria-label="События">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="20" x2="7" y2="4"/><polyline points="3 8 7 4 11 8"/><line x1="17" y1="4" x2="17" y2="20"/><polyline points="13 16 17 20 21 16"/></svg>
    </a>
    <a href="balances.html" class="topbtn active" aria-label="Балансы">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
    </a>
    <a href="expenses.html" class="topbtn" aria-label="За день">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </a>
  </nav>
  <button type="button" id="gear" aria-label="Настройки">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
  <main>
    <h1>Балансы</h1>
    <div id="accounts"></div>
    <div id="status"></div>
    <div id="updated"></div>
  </main>
  <div id="overlay">
    <div id="panel">
      <div id="panel-head">
        <h2>Настройки</h2>
        <button type="button" id="close" aria-label="Закрыть">×</button>
      </div>
      <input id="token" type="password" placeholder="Bearer token" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <label for="tz-select" style="display:block;margin:14px 0 6px;font-size:14px;opacity:0.7">Часовой пояс</label>
      <select id="tz-select" style="width:100%;padding:10px;border-radius:8px;font-size:15px;box-sizing:border-box"></select>
      <button type="button" class="action" id="save-config">Сохранить</button>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="balances.js"></script>
</body>
</html>
